<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pending With Presley — Presley Angle, EPM Real Estate</title>
  <meta name="description" content="Presley Angle — top-rated realtor at EPM Real Estate in Cape Girardeau, Missouri. Buying or selling, she'll be in touch the same day.">

  <meta property="og:title" content="Pending With Presley">
  <meta property="og:description" content="Buying or selling in Cape Girardeau? Presley Angle, EPM Real Estate — reach out today.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tokens.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-x: clip; }

    body {
      overflow-x: clip;
      font-family: var(--font-body);
      font-size: var(--text-base);
      line-height: 1.6;
      color: var(--color-ink);
      background: var(--color-paper);
      min-height: 100svh;
      -webkit-font-smoothing: antialiased;
    }

    img { display: block; max-width: 100%; }
    a   { color: inherit; text-decoration: none; }
    :focus-visible { outline: 2px solid var(--color-focus); outline-offset: 3px; }

    /* ── Page grid ─────────────────────────────────────────────── */
    .page {
      display: grid;
      grid-template-columns: 5fr 7fr;
      min-height: 100svh;
    }

    /* ── Photo ─────────────────────────────────────────────────── */
    .page__photo {
      position: sticky;
      top: 0;
      height: 100svh;
      overflow: hidden;
    }

    .page__photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    /* ── Content column ─────────────────────────────────────────── */
    .page__content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: var(--space-2xl);
      padding: var(--space-3xl) clamp(var(--space-xl), 5vw, var(--space-3xl));
      border-left: 1px solid var(--color-rule);
    }

    /* ── Header ─────────────────────────────────────────────────── */
    .page__wordmark {
      display: block;
      font-family: var(--font-display);
      font-weight: 600;
      font-style: italic;
      font-size: var(--text-md);
      letter-spacing: -0.01em;
      color: var(--color-neutral);
      margin-bottom: var(--space-xl);
    }

    .page__eyebrow {
      display: block;
      font-family: var(--font-body);
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: var(--space-md);
    }

    .page__headline {
      font-family: var(--font-display);
      font-weight: 300;
      font-style: italic;
      font-size: clamp(2rem, 2.8vw + 0.75rem, 3.5rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--color-ink);
      overflow-wrap: anywhere;
      min-width: 0;
    }

    /* ── Choice buttons ─────────────────────────────────────────── */
    .page__choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-md);
    }

    .choice {
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
      padding: var(--space-xl) var(--space-lg);
      border: 1px solid var(--color-rule);
      background: transparent;
      cursor: pointer;
      text-align: left;
      transition: border-color var(--dur-short) var(--ease-out),
                  background var(--dur-short) var(--ease-out);
      text-decoration: none;
    }

    .choice:hover {
      border-color: var(--color-accent);
      background: var(--color-paper-2);
    }

    .choice:focus-visible {
      outline: 2px solid var(--color-focus);
      outline-offset: 2px;
    }

    .choice__label {
      font-family: var(--font-body);
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-neutral);
      transition: color var(--dur-short) var(--ease-out);
    }

    .choice:hover .choice__label { color: var(--color-accent); }

    .choice__title {
      font-family: var(--font-display);
      font-weight: 300;
      font-style: italic;
      font-size: var(--text-xl);
      line-height: 1.1;
      letter-spacing: -0.01em;
      color: var(--color-ink);
    }

    .choice__arrow {
      font-style: normal;
      font-family: var(--font-body);
      font-size: var(--text-sm);
      color: var(--color-neutral);
      margin-top: var(--space-xs);
      transition: color var(--dur-short) var(--ease-out),
                  transform var(--dur-short) var(--ease-out);
      display: inline-block;
    }

    .choice:hover .choice__arrow {
      color: var(--color-accent);
      transform: translateX(4px);
    }

    /* ── Contact strip ──────────────────────────────────────────── */
    .page__contact {
      display: flex;
      align-items: baseline;
      gap: var(--space-xl);
      padding-top: var(--space-lg);
      border-top: 1px solid var(--color-rule);
    }

    .page__phone {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: var(--text-xl);
      letter-spacing: -0.01em;
      color: var(--color-ink);
      white-space: nowrap;
      transition: color var(--dur-short) var(--ease-out);
    }

    .page__phone:hover { color: var(--color-accent); }

    .page__brokerage {
      font-family: var(--font-body);
      font-size: var(--text-xs);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-neutral);
      line-height: 1.6;
    }

    /* ── Mobile ─────────────────────────────────────────────────── */
    @media (max-width: 52rem) {
      .page {
        grid-template-columns: 1fr;
        min-height: unset;
      }

      .page__photo {
        position: relative;
        aspect-ratio: 1 / 1;
        overflow: hidden;
        background: oklch(14% 0.008 55);
      }

      .page__photo img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center top;
      }

      .page__content {
        border-left: none;
        border-top: 1px solid var(--color-rule);
        padding: var(--space-lg) var(--space-lg) var(--space-2xl);
        justify-content: flex-start;
      }

      .page__wordmark { margin-bottom: var(--space-sm); }
    }

    @media (max-width: 30rem) {
      .page__choices  { grid-template-columns: 1fr; }
      .page__contact  { flex-direction: column; gap: var(--space-xs); }
    }
  </style>
</head>
<body>

  <div class="page">

    <div class="page__photo">
      <img src="presley.jpg"
           alt="Presley Angle, Realtor at EPM Real Estate, Cape Girardeau, Missouri"
           width="1920" height="2880">
    </div>

    <div class="page__content">

      <div>
        <span class="page__wordmark">Pending With Presley</span>
        <p class="page__eyebrow">EPM Real Estate · Cape Girardeau, Missouri</p>
        <h1 class="page__headline">Are you buying<br>or selling?</h1>
      </div>

      <div class="page__choices">
        <a class="choice" href="buyers.html">
          <span class="choice__label">I'm a buyer</span>
          <span class="choice__title">Buying</span>
          <span class="choice__arrow">→</span>
        </a>
        <a class="choice" href="sellers.html">
          <span class="choice__label">I'm a seller</span>
          <span class="choice__title">Selling</span>
          <span class="choice__arrow">→</span>
        </a>
      </div>

      <div class="page__contact">
        <a class="page__phone" href="tel:+15738038567">(573) 803&#8209;8567</a>
        <span class="page__brokerage">Presley Angle<br>EPM Real Estate</span>
      </div>

    </div>
  </div>

</body>
</html>
